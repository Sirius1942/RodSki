# rodski 路径配置
rodski:
  cli_path: "python rodski/ski_run.py"
  validate_cmd: "rodski validate"
  default_browser: "chromium"
  headless: true

# LLM 配置 — 按 Agent 类型分别配置
llm:
  design:
    provider: claude
    model: claude-sonnet-4-20250514
    base_url: "http://code.casstime.ai"
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.7
    max_tokens: 4096
  execution:
    provider: claude
    model: claude-sonnet-4-20250514
    base_url: "http://code.casstime.ai"
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.1
    max_tokens: 2048

# OmniParser 配置
omniparser:
  url: "http://14.103.175.167:7862"
  timeout: 30

# Agent 行为配置
design:
  max_scenarios: 10
  max_fix_attempts: 3

execution:
  max_retry: 3
  screenshot_on_fail: true
  diagnosis_enabled: true

# 输出配置
output:
  format: "human"
  verbose: false
