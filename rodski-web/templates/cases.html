{% extends "base.html" %}

{% block title %}用例管理 - RodSki Web{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📋 测试用例管理</h1>
    <div class="header-actions">
        <select id="module-filter" class="filter-select">
            <option value="">全部模块</option>
        </select>
        <input type="text" id="search-input" class="search-input" placeholder="搜索用例...">
        <button id="search-btn" class="btn btn-primary">🔍 搜索</button>
    </div>
</div>

<div class="cases-container">
    <div class="cases-list" id="cases-list">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="case-detail" id="case-detail" style="display: none;">
        <div class="detail-header">
            <h2 id="detail-title"></h2>
            <button class="btn btn-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-content" id="detail-content"></div>
        <div class="detail-actions">
            <button class="btn btn-primary" onclick="explainCase()">📖 查看说明</button>
            <button class="btn btn-success" onclick="runCase()">▶️ 执行用例</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
{% endblock %}

{% block extra_js %}
<script>
let currentCases = [];
let currentCaseId = null;

document.addEventListener('DOMContentLoaded', function() {
    loadModules();
    loadCases();
    
    document.getElementById('search-btn').addEventListener('click', searchCases);
    document.getElementById('module-filter').addEventListener('change', loadCases);
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchCases();
    });
});

function loadModules() {
    fetch('/api/cases/modules')
        .then(r => r.json())
        .then(data => {
            const select = document.getElementById('module-filter');
            data.modules.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                select.appendChild(opt);
            });
            
            // 检查 URL 参数
            const params = new URLSearchParams(window.location.search);
            const module = params.get('module');
            if (module) select.value = module;
        });
}

function loadCases() {
    const module = document.getElementById('module-filter').value;
    const url = module ? `/api/cases?module=${module}` : '/api/cases';
    
    fetch(url)
        .then(r => r.json())
        .then(data => {
            currentCases = data.cases || [];
            renderCases(currentCases);
        });
}

function searchCases() {
    const keyword = document.getElementById('search-input').value;
    if (!keyword) {
        loadCases();
        return;
    }
    
    fetch(`/api/cases?keyword=${encodeURIComponent(keyword)}`)
        .then(r => r.json())
        .then(data => {
            currentCases = data.cases || [];
            renderCases(currentCases);
        });
}

function renderCases(cases) {
    const list = document.getElementById('cases-list');
    
    if (cases.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无用例</div>';
        return;
    }
    
    list.innerHTML = cases.map(c => `
        <div class="case-card" onclick="showCaseDetail('${c.id}')">
            <div class="case-header">
                <span class="case-id">${c.id}</span>
                <span class="case-execute ${c.execute === '是' ? 'execute-yes' : 'execute-no'}">${c.execute === '是' ? '✅ 执行' : '⏸️ 跳过'}</span>
            </div>
            <h3 class="case-title">${c.title}</h3>
            <p class="case-desc">${c.description || '无描述'}</p>
            <div class="case-meta">
                <span>📁 ${c.component_type}</span>
            </div>
        </div>
    `).join('');
}

function showCaseDetail(caseId) {
    const caseData = currentCases.find(c => c.id === caseId);
    if (!caseData) return;
    
    currentCaseId = caseId;
    document.getElementById('detail-title').textContent = caseData.title;
    
    let html = `
        <div class="detail-info">
            <div class="info-row"><strong>用例ID:</strong> ${caseData.id}</div>
            <div class="info-row"><strong>描述:</strong> ${caseData.description || '无'}</div>
            <div class="info-row"><strong>组件类型:</strong> ${caseData.component_type}</div>
        </div>
        <div class="detail-phases">
    `;
    
    const phaseNames = {
        'pre_process': '🔧 前置准备',
        'test_case': '🧪 测试步骤',
        'post_process': '🧹 清理工作'
    };
    
    for (const [phase, data] of Object.entries(caseData.phases || {})) {
        if (data.steps && data.steps.length > 0) {
            html += `<div class="phase-section">
                <h4>${phaseNames[phase] || phase}</h4>
                <ol class="steps-list">`;
            
            data.steps.forEach((step, i) => {
                const modelInfo = step.model ? ` <em>(${step.model})</em>` : '';
                html += `<li><code>${step.action}</code>${modelInfo}: ${step.data}</li>`;
            });
            
            html += '</ol></div>';
        }
    }
    
    html += '</div>';
    
    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('case-detail').style.display = 'block';
}

function closeDetail() {
    document.getElementById('case-detail').style.display = 'none';
    currentCaseId = null;
}

function explainCase() {
    if (!currentCaseId) return;
    
    fetch(`/api/cases/${currentCaseId}/explain`)
        .then(r => r.json())
        .then(data => {
            alert(data.explanation);
        });
}

function runCase() {
    if (!currentCaseId) return;
    
    showToast('正在执行用例...', 'info');
    
    fetch('/api/runner/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({case_id: currentCaseId})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('用例执行成功!', 'success');
        } else {
            showToast('用例执行失败: ' + (data.error || data.stderr), 'error');
        }
    });
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast toast-${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
{% endblock %}
