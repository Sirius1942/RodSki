{% extends "base.html" %}

{% block title %}模型管理 - RodSki Web{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🎯 页面模型管理</h1>
    <div class="header-actions">
        <input type="text" id="search-input" class="search-input" placeholder="搜索模型...">
        <button id="search-btn" class="btn btn-primary">🔍 搜索</button>
    </div>
</div>

<div class="models-container">
    <div class="models-grid" id="models-grid">
        <div class="loading">加载中...</div>
    </div>
    
    <div class="model-detail" id="model-detail" style="display: none;">
        <div class="detail-header">
            <h2 id="detail-title"></h2>
            <button class="btn btn-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-content" id="detail-content"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentModels = [];

document.addEventListener('DOMContentLoaded', function() {
    loadModels();
    
    document.getElementById('search-btn').addEventListener('click', searchModels);
    document.getElementById('search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchModels();
    });
});

function loadModels() {
    fetch('/api/models')
        .then(r => r.json())
        .then(data => {
            currentModels = data.models || [];
            renderModels(currentModels);
        });
}

function searchModels() {
    const keyword = document.getElementById('search-input').value;
    if (!keyword) {
        loadModels();
        return;
    }
    
    fetch(`/api/models?keyword=${encodeURIComponent(keyword)}`)
        .then(r => r.json())
        .then(data => {
            currentModels = data.models || [];
            renderModels(currentModels);
        });
}

function renderModels(models) {
    const grid = document.getElementById('models-grid');
    
    if (models.length === 0) {
        grid.innerHTML = '<div class="empty-state">暂无模型</div>';
        return;
    }
    
    grid.innerHTML = models.map(m => `
        <div class="model-card" onclick="showModelDetail('${m.name}')">
            <div class="model-icon">🎯</div>
            <h3 class="model-name">${m.name}</h3>
            <p class="model-elements">${m.elements ? m.elements.length : 0} 个元素</p>
        </div>
    `).join('');
}

function showModelDetail(modelName) {
    const model = currentModels.find(m => m.name === modelName);
    if (!model) return;
    
    document.getElementById('detail-title').textContent = model.name;
    
    let html = '<div class="elements-table"><table><thead><tr><th>名称</th><th>类型</th><th>定位符</th><th>描述</th></tr></thead><tbody>';
    
    (model.elements || []).forEach(el => {
        html += `<tr>
            <td>${el.name}</td>
            <td><span class="type-badge">${el.type}</span></td>
            <td><code>${el.value}</code></td>
            <td>${el.desc || '-'}</td>
        </tr>`;
    });
    
    html += '</tbody></table></div>';
    
    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('model-detail').style.display = 'block';
}

function closeDetail() {
    document.getElementById('model-detail').style.display = 'none';
}
</script>
{% endblock %}
