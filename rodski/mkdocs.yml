site_name: RodSki Documentation
site_description: RodSki Test Automation Framework Documentation
site_author: RodSki Team

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Agent Integration:
      - Overview: agent-integration/overview.md
      - Setup: agent-integration/setup.md
  - Reference:
      - Keywords: reference/keywords.md
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
  - Best Practices:
      - Writing Tests: best-practices/writing-tests.md
      - Error Handling: best-practices/error-handling.md

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rodski
