<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RodSki 测试用例编写指南</title>
  <link rel="stylesheet" href="https://unpkg.com/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #3b82f6;
      --theme-color-dark: #2563eb;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'RodSki 测试用例编写指南 v3.4',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      themeColor: '#3b82f6',
      search: {
        placeholder: '搜索文档...',
        noData: '未找到结果',
        depth: 3
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
      }
    }
  </script>
  <script src="https://unpkg.com/docsify@4/lib/docsify.min.js"></script>
  <script src="https://unpkg.com/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://unpkg.com/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://unpkg.com/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://unpkg.com/prismjs@1/components/prism-markup.min.js"></script>
  <script src="https://unpkg.com/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://unpkg.com/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://unpkg.com/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
