# LLM Reviewer 配置

# API 配置
api_base: "http://code.casstime.ai"
api_key: "sk-f3tf9sUywnTBNbkQesLsaEE5Abtz1vZX88Sqvqm5MG7cGg3w"
model: "gpt-5.4"
temperature: 0.1
max_tokens: 2000

# 审查配置
review:
  enable_vision: true
  max_screenshots: 10
  system_prompt: |
    你是一个专业的自动化测试结果审查员。
    你的任务是根据测试用例定义、执行日志和截图，判断测试是否真正成功。
    
    判断标准：
    1. 所有步骤是否按预期执行
    2. 截图中的界面状态是否符合预期
    3. 是否有异常、错误或警告
    4. 最终结果是否达到测试目标
    
    输出格式：
    {
      "verdict": "PASS|FAIL|SUSPICIOUS",
      "confidence": 0.0-1.0,
      "reason": "判断理由",
      "issues": ["发现的问题列表"]
    }
