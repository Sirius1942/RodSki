<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RodSki Web{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="mario-header">
        <div class="header-content">
            <div class="logo">
                <span class="mario-icon">🍄</span>
                <h1>RodSki Web</h1>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-item">🏠 首页</a>
                <a href="/cases" class="nav-item">📋 用例</a>
                <a href="/models" class="nav-item">🎯 模型</a>
                <a href="/results" class="nav-item">📊 结果</a>
                <a href="/runner" class="nav-item">▶️ 执行</a>
            </nav>
            <div class="project-selector">
                <label for="project-select">📁 项目:</label>
                <select id="project-select" onchange="switchProject(this.value)">
                    {% for proj in projects %}
                    <option value="{{ proj.name }}" {% if current_project.name == proj.name %}selected{% endif %}>{{ proj.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="mario-footer">
        <p>🍄 RodSki Web - 关键字驱动测试框架 | Powered by Flask</p>
    </footer>
    
    <script src="/static/js/app.js"></script>
    <script>
    function switchProject(projectName) {
        fetch('/api/projects/switch', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({project_name: projectName})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // 刷新当前页面以加载新项目数据
                location.reload();
            } else {
                alert('切换失败: ' + (data.error || '未知错误'));
            }
        })
        .catch(err => {
            console.error('切换项目失败:', err);
            alert('切换项目失败');
        });
    }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
